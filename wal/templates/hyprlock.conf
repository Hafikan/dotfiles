# Auto-generated by pywal from template
# Edit ~/.config/wal/templates/hyprlock.conf, then run `wal -R`

background {{
    monitor =
    path = {wallpaper}
    blur_passes = 3
    blur_size = 8
    contrast = 0.9
    brightness = 0.75
    vibrancy = 0.17
    vibrancy_darkness = 0.0
}}

general {{
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
    no_fade_in = false
}}

# Greeting
label {{
    monitor =
    text = Welcome
    color = {color7.rgba}
    font_size = 55
    font_family = CodeNewRoman Nerd Font Mono
    position = 150, 320
    halign = left
    valign = center
}}

# Saat
label {{
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = {color7.rgba}
    font_size = 40
    font_family = CodeNewRoman Nerd Font Mono
    position = 150, 240
    halign = left
    valign = center
}}

# Day, Date
label {{
    monitor =
    text = cmd[update:60000] echo -e "$(date +"%A, %B %d")"
    color = {color7.rgba}
    font_size = 19
    font_family = CodeNewRoman Nerd Font Mono
    position = 150, 175
    halign = left
    valign = center
}}

# User box (background)
shape {{
    monitor =
    size = 320, 55
    color = {color8.rgba}
    rounding = 8
    border_size = 0
    rotate = 0
    xray = false
    position = 150, -140
    halign = left
    valign = center
}}

# Username
label {{
    monitor =
    text =      $USER
    color = {color7.rgba}
    font_size = 16
    font_family = CodeNewRoman Nerd Font Mono
    position = 150, -140
    halign = left
    valign = center
}}

# Password field
input-field {{
    monitor =
    size = 320, 55
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = {color5.rgba}
    inner_color = {color0.rgba}
    font_color = {color7.rgba}
    fade_on_empty = false
    font_family = CodeNewRoman Nerd Font Mono
    placeholder_text = <i><span foreground="##{color7.strip}99">🔒  Enter Password</span></i>
    hide_input = false
    rounding = 8
    check_color = {color2.rgba}
    fail_color = {color1.rgba}
    fail_text = <i>Wrong password ($ATTEMPTS)</i>
    position = 150, -220
    halign = left
    valign = center
}}
